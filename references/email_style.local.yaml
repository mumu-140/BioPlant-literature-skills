base_css: |
  .container {
    padding: 0 5px;
  }

  .hero h1 {
    font-size: 20px;
  }

  .card-title,
  .card-title-zh {
    font-size: 16px;
    line-height: 1.22;
  }

  .card-authors {
    font-size: 10px;
  }

mobile_css: |
  .container {
    padding: 0 3px;
  }

  .hero h1 {
    font-size: 12px;
  }

  .card-title,
  .card-title-zh {
    font-size: 10px;
  }

  .card-authors,
  .card-meta,
  .abstract-preview,
  .abstract-full,
  .card-footer {
    font-size: 8px;
  }
