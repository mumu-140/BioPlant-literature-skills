defaults:
  timezone: Asia/Shanghai
  delivery_time: "08:00"
  lookback_hours: 24
  include_article_types:
    - article
    - research-article
    - review
    - perspective
    - protocol
    - resource
    - report
    - brief-communication
    - tools
    - database
    - matters-arising
    - commentary
  dedupe_priority:
    - doi
    - canonical_url
    - normalized_title_plus_journal

notes:
  - Keep `source_locator` nullable in the draft until official feed URLs are verified journal by journal.
  - Treat the watchlist as editable configuration, not as a fixed taxonomy.
  - Exclude HGT from the first version.
  - The RSS spreadsheet from `/Users/mumu/Downloads/rss.xlsx` has been partially incorporated for matching journals in scope.
  - Keep preprints clearly marked as `publication_stage: preprint` in downstream exports.
