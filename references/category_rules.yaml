classification_policy:
  max_categories_per_paper: 1
  fallback_category: other
  primary_method: keyword-first
  secondary_method: llm-tiebreak
  require_explicit_reason: true

output_schema:
  required_columns:
    - journal
    - publish_date
    - publication_stage
    - category
    - title_en
    - title_zh
    - authors
    - summary_zh
    - abstract
    - doi
    - article_url
    - tags

  greeting_template: "{date}--祝你早上快乐--这是今日份的论文快看吧"

  summary_requirements:
    language: zh-CN
    style: concise-professional
    max_sentences: 4
    must_cover:
      - research_subject
      - main_finding_or_resource
      - biology_relevance

  title_translation_requirements:
    language: zh-CN
    preserve_gene_and_protein_symbols: true
    preserve_species_names_when_clear: true

review_queue_schema:
  required_columns:
    - journal
    - publish_date
    - publication_stage
    - category
    - title_en
    - llm_decision
    - llm_confidence
    - llm_reason
    - relevance_reason
    - doi
    - article_url
    - tags

notes:
  - Assign exactly one category per paper.
  - Send ambiguous but relevant papers to `other` instead of inventing new buckets.
  - Prefer plant-specific categories only when the paper is truly plant-centered.

